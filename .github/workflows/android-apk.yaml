name: Android Release APK
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0). Leave empty to use latest git tag.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'
  release:
    types: [published]
jobs:
  build-signed-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to upload assets / create release
    env:
      # Gradle signing config expects these.
      # TEST build: a self-signed keystore is generated on the fly below,
      # so no repository secrets are required to produce a signed APK.
      # Replace this block with real secrets for a production release.
      RELEASE_STORE_FILE: ../release.keystore
      RELEASE_STORE_PASSWORD: androidtest
      RELEASE_KEY_ALIAS: nospeaktest
      RELEASE_KEY_PASSWORD: androidtest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed to resolve git tags for fallback
      - name: Determine version tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ] && [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          if [ -z "$TAG" ]; then
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          build-tools: "36.0.0"
      - name: Install dependencies
        run: npm ci
      - name: Build web assets and sync Capacitor
        run: npm run build:android
      - name: Workaround for missing capacitor-cordova-android-plugins
        run: |
          # Create the directory if it doesn't exist, or if the critical file is missing
          if [ ! -f "android/capacitor-cordova-android-plugins/cordova.variables.gradle" ]; then
            echo "Creating missing capacitor-cordova-android-plugins module"
            mkdir -p android/capacitor-cordova-android-plugins/src/main
            echo "ext.cordovaConfig = [:]" > android/capacitor-cordova-android-plugins/cordova.variables.gradle
            echo "buildscript { repositories { google(); mavenCentral() } dependencies { classpath 'com.android.tools.build:gradle:8.13.0' } } apply plugin: 'com.android.library' android { namespace \"capacitor.android.plugins\" compileSdk 36 defaultConfig { minSdkVersion 24 targetSdkVersion 36 } }" > android/capacitor-cordova-android-plugins/build.gradle
            echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="capacitor.android.plugins"/>' > android/capacitor-cordova-android-plugins/src/main/AndroidManifest.xml
          fi
      - name: Generate test (self-signed) release keystore
        working-directory: android/app
        run: |
          # TEST build only: generate a throwaway self-signed keystore so the
          # release APK can be signed without any repository secrets.
          # For a real release, delete this step and restore the
          # ANDROID_KEYSTORE_BASE64 secret + RELEASE_* secrets instead.
          keytool -genkeypair -v \
            -keystore "$RELEASE_STORE_FILE" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias "$RELEASE_KEY_ALIAS" \
            -storepass "$RELEASE_STORE_PASSWORD" \
            -keypass "$RELEASE_KEY_PASSWORD" \
            -dname "CN=nospeak-test, OU=test, O=nospeak, L=test, ST=test, C=US"
          ls -la "$RELEASE_STORE_FILE"
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew
      - name: Build signed release APK
        working-directory: android
        run: ./gradlew :app:assembleRelease
      - name: Rename APK with release tag
        working-directory: android
        run: |
          SRC="app/build/outputs/apk/release/app-release.apk"
          DST="app/build/outputs/apk/release/nospeak.apk"
          cp "$SRC" "$DST"
      - name: Upload APK as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: nospeak-apk
          path: android/app/build/outputs/apk/release/nospeak.apk
      - name: Create/Update GitHub Release and attach APK
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release' || github.event_name == 'push'
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            ## nospeak ${{ env.RELEASE_TAG }}

            Auto-built from tag [`${{ env.RELEASE_TAG }}`](https://github.com/${{ github.repository }}/tree/${{ env.RELEASE_TAG }}).

            ### What's new
            See the [changelog](https://github.com/${{ github.repository }}/releases/tag/${{ env.RELEASE_TAG }}) for details.

            ### Download
            - **APK**: `nospeak.apk` attached below
          draft: ${{ github.event_name == 'push' }}
          prerelease: false
          files: android/app/build/outputs/apk/release/nospeak.apk
